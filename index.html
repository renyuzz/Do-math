<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保齡球 B標換算器</title>
  <!-- 引入 Tailwind CSS 進行排版與樣式設計 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 p-4 font-sans flex justify-center items-start">
  
  <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden mt-6">
    
    <!-- Header -->
    <div class="bg-blue-600 dark:bg-blue-700 p-6 text-center">
      <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="10" cy="9" r="1" fill="currentColor"></circle>
          <circle cx="14" cy="9" r="1" fill="currentColor"></circle>
          <circle cx="12" cy="13" r="1" fill="currentColor"></circle>
        </svg>
        保齡球 B標換算器
      </h1>
      <p class="text-blue-100 text-sm mt-2 opacity-90">快速計算 B標結果</p>
    </div>

    <div class="p-6 space-y-6">
      <!-- 輸入區塊 -->
      <div class="space-y-4">
        
        <!-- A標分數 -->
        <div>
          <label class="block text-sm font-medium mb-1">A標分數</label>
          <input 
            type="number" 
            id="baseScore"
            value="200"
            class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all dark:text-white"
            placeholder="請輸入A標分數"
          />
        </div>

        <!-- 顯示模式 -->
        <div>
          <label class="block text-sm font-medium mb-1">顯示模式</label>
          <select 
            id="cupMode"
            class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all dark:text-white"
          >
            <option value="all">全部倍率</option>
            <option value="leisure">超越休閒盃</option>
            <option value="dajiale">超越大家樂</option>
          </select>
        </div>
      </div>

      <!-- B標結果 -->
      <div class="pt-4 border-t border-slate-200 dark:border-slate-700">
        <h2 class="text-sm font-medium mb-3 text-slate-500 dark:text-slate-400 text-center">
           各倍率計算結果
        </h2>
        <!-- 改為 Grid 網格顯示所有倍率結果，並加入卷軸 -->
        <div id="resultsGrid" class="grid grid-cols-3 gap-3 max-h-[350px] overflow-y-auto p-1" style="scrollbar-width: thin;">
          <!-- 結果會顯示在這裡 -->
        </div>
      </div>

    </div>
  </div>

  <script>
    // 取得畫面上的 HTML 元素
    const baseScoreInput = document.getElementById('baseScore');
    const resultsGrid = document.getElementById('resultsGrid');
    const cupModeSelect = document.getElementById('cupMode');

    // 1. 定義不同的倍率陣列模式
    const modes = {
      all: [],
      leisure: ["0.60", "0.64", "0.68", "0.72", "0.76", "0.80", "0.84", "0.88"],
      dajiale: ["0.60", "0.64", "0.68", "0.72", "0.76", "0.80", "0.84", "0.88"]
    };

    // 產生全部的倍率 (0.60 到 0.92)
    for (let i = 0; i <= 32; i++) {
      modes.all.push((0.60 + i * 0.01).toFixed(2));
    }

    // 2. 計算並顯示所有B標結果的函數
    function calculate() {
      // 取得輸入的值，如果為空則當作 0
      const baseScore = parseFloat(baseScoreInput.value) || 0;
      
      // 取得目前選取的模式陣列
      const activeMultipliers = modes[cupModeSelect.value];
      
      // 清空現有的結果
      resultsGrid.innerHTML = '';
      
      // 迴圈產生每個倍率的卡片
      activeMultipliers.forEach(multiplier => {
        const result = (baseScore * parseFloat(multiplier)).toFixed(1);
        
        // 建立卡片 HTML 結構
        const card = document.createElement('div');
        card.className = "bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3 border border-blue-100 dark:border-blue-800/50 flex flex-col items-center shadow-sm";
        card.innerHTML = `
          <span class="text-xs text-slate-500 dark:text-slate-400 mb-1">倍率 ${multiplier}</span>
          <span class="text-xl font-bold text-blue-700 dark:text-blue-300">${result}</span>
        `;
        
        resultsGrid.appendChild(card);
      });
    }

    // 3. 監聽輸入框與下拉選單的變化，只要有改變就重新計算
    baseScoreInput.addEventListener('input', calculate);
    cupModeSelect.addEventListener('change', calculate);

    // 4. 網頁剛載入時先執行一次計算
    calculate();
  </script>
</body>
</html>
